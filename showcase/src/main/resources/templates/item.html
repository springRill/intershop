<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8"/>
    <title>Витрина товаров</title>
</head>

<body>
<div th:if="${!isAuthenticated}">
    <form th:action="@{/login}" method="get">
        <button type="submit">Войти</button>
    </form>
</div>
<div th:if="${isAuthenticated}">
    <form th:action="@{/logout}" method="post">
        <button type="submit">Выйти</button>
        <span style="margin-left: 10px;"><b th:text="'Пользователь: '+${auth.name}"></b></span>
    </form>
</div>

<a href="/orders" style="float:right;" th:if="${isAuthenticated}">
    <b>ЗАКАЗЫ &cudarrr;</b>
</a>
<a href="/cart/items" style="float:right;" th:if="${isAuthenticated}">
    <b>КОРЗИНА &cudarrr;</b>
</a>
<a href="/main/items" style="float:right;">
    <b>ГЛАВНАЯ &cudarrr;</b>
</a>
<div style="width:70%;margin-left:auto;margin-right:auto;">
    <p>
        <img width="300" height="300" th:src="${'http://localhost:8080/images/'+item.getImgPath()}">
    </p>
    <p>
        <b th:text="${item.getTitle()}"></b>
        <b th:text="${item.getPrice()}+' руб.'" style="text-align:right;"></b>
    </p>
    <p>
        <span th:text="${item.getDescription()}"></span>
    </p>
    <form th:action="${'/items/'+item.getId()}" method="post" th:if="${isAuthenticated}">
        <button name="action" value="MINUS">-</button>
        <span th:text="${item.getCount()}"></span>
        <button name="action" value="PLUS">+</button>
        <button name="action" value="PLUS" th:if="${item.getCount()==0}" style="float:right;">В корзину</button>
    </form>
</div>
</body>

</html>
