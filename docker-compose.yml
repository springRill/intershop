services:
  redis:
    image: redis:7.4.2-bookworm
    container_name: intershop-redis-server
    ports:
      - "6379:6379"
    command: ["redis-server"]
    restart: unless-stopped
    networks:
      - intershop_net

  services:
    build:
      context: ./services
      dockerfile: Dockerfile
    container_name: intershop-services-container
    ports:
      - "8081:8081"
    networks:
      - intershop_net
    depends_on:
      - redis

  showcase:
    build:
      context: ./showcase
      dockerfile: Dockerfile
    container_name: intershop-showcase-container
    ports:
      - "8080:8080"
    depends_on:
      - redis
    networks:
      - intershop_net
    environment:
      - SPRING_REDIS_HOST=redis
      - services.api.base-url=http://services:8081

networks:
  intershop_net:
    driver: bridge