services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.1.3
    container_name: intershop-keycloak-server
    ports:
      - "8082:8080"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    command:
      - start-dev
      - --import-realm
    volumes:
      - ./keycloak/realms:/opt/keycloak/data/import
    networks:
      - intershop_net

  redis:
    image: redis:7.4.2-bookworm
    container_name: intershop-redis-server
    ports:
      - "6379:6379"
    command: ["redis-server"]
    restart: unless-stopped
    networks:
      - intershop_net

  services:
    build:
      context: ./services
      dockerfile: Dockerfile
    container_name: intershop-services-container
    ports:
      - "8081:8081"
    networks:
      - intershop_net
    depends_on:
      - redis
      - keycloak
    environment:
      - ISSUER_URI=http://keycloak:8080/realms/intershop

  showcase:
    build:
      context: ./showcase
      dockerfile: Dockerfile
    container_name: intershop-showcase-container
    ports:
      - "8080:8080"
    depends_on:
      - keycloak
      - redis
    networks:
      - intershop_net
    environment:
      - SPRING_REDIS_HOST=redis
      - services.api.base-url=http://services:8081
      - ISSUER_URI=http://keycloak:8080/realms/intershop

networks:
  intershop_net:
    driver: bridge